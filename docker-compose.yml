# Local/prod-like stack. Postgres is included for the forthcoming Prisma store
# (the server currently uses in-memory repositories); Redis powers the Socket.IO
# adapter when REDIS_URL is set. Override secrets via a .env file (see .env.example).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: murlan
      POSTGRES_PASSWORD: murlan
      POSTGRES_DB: murlan
    # Bind to localhost only — Postgres is reached by the server over the internal
    # Docker network (host:port is for local debugging, never public on a VPS).
    ports: ['127.0.0.1:5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U murlan']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['127.0.0.1:6379:6379'] # localhost only (reached over the internal network)
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      NODE_ENV: production
      PORT: '3000'
      # Your public site origin (used for CORS + cookies). Override in .env for a domain.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      # Staging/demo WITHOUT payment+email integration: set ALLOW_STUB_PROVIDERS=true
      # so the server boots on the stub providers (mock deposits, emails to logs).
      # Leave false (the default) for any real-money instance — boot will then refuse
      # to start until real Stripe/PayPal + SMTP providers are wired.
      ALLOW_STUB_PROVIDERS: ${ALLOW_STUB_PROVIDERS:-false}
      # Fail CLOSED: Compose refuses to start if these are unset/empty (no weak
      # 'change-me-*' fallback). Set strong, unique values in your .env.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env (>=32 random chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env (>=32 random chars, different from access)}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?set PAYMENT_WEBHOOK_SECRET in .env}
      # Optional CSV of allowed deposit-webhook source IPs (empty = any). Needs the proxy
      # to set X-Forwarded-For authoritatively. And the proxy-trust override (default:
      # loopback + RFC1918) — set if your reverse-proxy chain differs.
      PAYMENT_WEBHOOK_IPS: ${PAYMENT_WEBHOOK_IPS:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      # Real crypto deposits are on-chain USDT-TRC20 via the TxID flow — set
      # TRON_DEPOSIT_ADDRESS (+ optional TRONGRID_API_KEY) below to enable.
      # Real reset/verification emails via Resend. Set RESEND_API_KEY to enable.
      # EMAIL_FROM must be on a domain verified in Resend; leave blank to use Resend's
      # test sender (delivers ONLY to your own Resend account email).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # This account is auto-promoted to admin on boot (reach the admin panel).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      REDIS_URL: redis://redis:6379
      # Persistence ON by default → the bundled Postgres, so accounts/wallets SURVIVE
      # restarts & redeploys (in-memory wiped them). Migrations auto-apply on boot
      # (see Dockerfile.server). Override DATABASE_URL/DIRECT_URL in .env for an
      # external DB (e.g. Supabase); set DATABASE_URL='' to force in-memory.
      DATABASE_URL: ${DATABASE_URL-postgres://murlan:murlan@postgres:5432/murlan}
      DIRECT_URL: ${DIRECT_URL-postgres://murlan:murlan@postgres:5432/murlan}
      RAKE_BPS: ${RAKE_BPS:-1000}
      # Four-eyes control: when true, a tournament champion payout needs a SECOND admin
      # to confirm before funds move (off by default — a solo operator has no 2nd admin).
      TOURNAMENT_DUAL_CONTROL: ${TOURNAMENT_DUAL_CONTROL:-false}
      # When set, GET /metrics requires Authorization: Bearer <token> (else it's served
      # only to private/loopback IPs — fine behind Docker's internal network).
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # Compliance switches (off by default):
      KYC_REQUIRED: ${KYC_REQUIRED:-false}
      MIN_AGE: ${MIN_AGE:-0}
      GEO_BLOCKED_COUNTRIES: ${GEO_BLOCKED_COUNTRIES:-}
      RESPONSIBLE_GAMING: ${RESPONSIBLE_GAMING:-false}
      # Ops alerts (Telegram) — set BOTH to ping the owner on a withdrawal request.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # ALSO set this → the INTERACTIVE admin bot turns on: withdrawal alerts gain
      # Approve/Reject buttons + /stats /user /credit … commands. The inbound webhook
      # (/api/telegram/webhook) verifies this secret (fail-closed). Leave empty = alerts
      # only. Requires CLIENT_ORIGIN to be your real https domain (webhook self-registers).
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      # Data retention: prune match move-logs older than N days during the sweep
      # (0 = keep forever — replays/audit stay available).
      MOVELOG_RETENTION_DAYS: ${MOVELOG_RETENTION_DAYS:-0}
      # Semi-auto / automatic crypto payout. AUTO_WITHDRAW_MAX_CENTS>0 + a payout
      # provider's creds = auto-pay small KYC-verified withdrawals (rest manual).
      AUTO_WITHDRAW_MAX_CENTS: ${AUTO_WITHDRAW_MAX_CENTS:-0}
      AUTO_WITHDRAW_CURRENCY: ${AUTO_WITHDRAW_CURRENCY:-usdttrc20}
      DAILY_AUTO_WITHDRAW_CAP_CENTS: ${DAILY_AUTO_WITHDRAW_CAP_CENTS:-0}
      # "Time to sweep" Telegram alert: ping once the on-chain deposit-address USDT total
      # reaches this many CENTS (0 = off). e.g. 10000 = $100. Also surfaced by /deposits.
      SWEEP_ALERT_CENTS: ${SWEEP_ALERT_CENTS:-0}
      # Auto-payout via the Binance withdraw API (when set + a positive cap). Needs
      # Enable Withdrawals + the server IP whitelisted + address whitelist OFF.
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      # Fee-free USDT-TRC20 deposits via on-chain TxID verify. PREFERRED: set
      # TRON_DEPOSIT_XPUB (watch-only account xpub) → a UNIQUE deposit address per
      # player, attributed by which address received funds (theft-proof; no private
      # keys on the server). Legacy single shared address (claim-jackable) only if no xpub.
      TRON_DEPOSIT_XPUB: ${TRON_DEPOSIT_XPUB:-}
      TRON_DEPOSIT_ADDRESS: ${TRON_DEPOSIT_ADDRESS:-}
      TRONGRID_API_KEY: ${TRONGRID_API_KEY:-}
    # Localhost only — the public entry point is the client (nginx) below, which
    # proxies /api + /socket.io to this service over the internal Docker network.
    # Don't expose the server directly (it would bypass nginx's headers + your TLS).
    ports: ['127.0.0.1:3000:3000']
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    # Localhost only. In production Caddy (deploy overlay) reaches the client over the
    # internal Docker network and terminates TLS; publishing 8080 on 0.0.0.0 would let
    # anyone hit the site over plain HTTP, bypassing Caddy's HTTPS. 127.0.0.1 keeps it
    # reachable for local dev (http://localhost:8080) but never from outside the host.
    ports: ['127.0.0.1:8080:80']
    depends_on: ['server']

volumes:
  pgdata:
