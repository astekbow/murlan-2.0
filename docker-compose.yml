# Local/prod-like stack. Postgres is included for the forthcoming Prisma store
# (the server currently uses in-memory repositories); Redis powers the Socket.IO
# adapter when REDIS_URL is set. Override secrets via a .env file (see .env.example).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: murlan
      POSTGRES_PASSWORD: murlan
      POSTGRES_DB: murlan
    # Bind to localhost only — Postgres is reached by the server over the internal
    # Docker network (host:port is for local debugging, never public on a VPS).
    ports: ['127.0.0.1:5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U murlan']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['127.0.0.1:6379:6379'] # localhost only (reached over the internal network)
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      NODE_ENV: production
      PORT: '3000'
      # Your public site origin (used for CORS + cookies). Override in .env for a domain.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      # Staging/demo WITHOUT payment+email integration: set ALLOW_STUB_PROVIDERS=true
      # so the server boots on the stub providers (mock deposits, emails to logs).
      # Leave false (the default) for any real-money instance — boot will then refuse
      # to start until real Stripe/PayPal + SMTP providers are wired.
      ALLOW_STUB_PROVIDERS: ${ALLOW_STUB_PROVIDERS:-false}
      # Fail CLOSED: Compose refuses to start if these are unset/empty (no weak
      # 'change-me-*' fallback). Set strong, unique values in your .env.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env (>=32 random chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env (>=32 random chars, different from access)}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?set PAYMENT_WEBHOOK_SECRET in .env}
      REDIS_URL: redis://redis:6379
      # Postgres is OPT-IN — the server runs in-memory unless DATABASE_URL is set.
      # To enable Prisma/Postgres: set DATABASE_URL (e.g. postgres://murlan:murlan@postgres:5432/murlan)
      # and apply the migration first: npm run db:migrate --workspace @murlan/server
      DATABASE_URL: ${DATABASE_URL:-}
      RAKE_BPS: ${RAKE_BPS:-1000}
      # Compliance switches (off by default):
      KYC_REQUIRED: ${KYC_REQUIRED:-false}
      MIN_AGE: ${MIN_AGE:-0}
      GEO_BLOCKED_COUNTRIES: ${GEO_BLOCKED_COUNTRIES:-}
      RESPONSIBLE_GAMING: ${RESPONSIBLE_GAMING:-false}
    # Localhost only — the public entry point is the client (nginx) below, which
    # proxies /api + /socket.io to this service over the internal Docker network.
    # Don't expose the server directly (it would bypass nginx's headers + your TLS).
    ports: ['127.0.0.1:3000:3000']
    depends_on:
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports: ['8080:80']
    depends_on: ['server']

volumes:
  pgdata:
