<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Allow pinch-zoom (accessibility / real-money compliance: users must be able
         to zoom amounts, addresses, terms). viewport-fit=cover enables safe-area insets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0a0e" />
    <meta name="description" content="Murlan — loja shqiptare e letrave online, në kohë reale." />
    <title>Crypto-Murlan</title>
    <!-- PWA: installable + standalone (add to home screen). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crypto-Murlan" />
    <!-- iOS "Add to Home Screen" icon. iOS caches the apple-touch-icon AGGRESSIVELY by URL, so when the
         logo changed it kept serving the old cached /icon-192.png. Point it at a DEDICATED file + bump the
         ?v= query whenever the logo changes, so iOS re-fetches (apple-touch-icon.png = a copy of the current
         icon-192.png; regenerate both on a logo change). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <!-- Browser-tab favicon = the brand logo (black ♠ + red, on a white tile so it stays
         visible on dark tab strips too). PNG so it renders crisply when downscaled to 16–32px. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Trimmed to the weights actually used (audit L9): Cinzel 900 (.crest/.tlogo only — 600/700 were
         never used), Oswald 600/700 (buttons/labels — 500 unused), Outfit 300–700 (body + Tailwind
         font-weight utilities). display=swap renders text immediately with the fallback then swaps (no
         FOIT); the preload hint prioritizes the font CSS without an inline script (CSP-safe). -->
    <!-- perf: warm DNS/TLS to the font hosts so the render-blocking CSS + font files resolve faster
         — cuts an RTT off first paint, no inline script (CSP-safe). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Oswald:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Oswald:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
