<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <!-- Allow pinch-zoom (accessibility / real-money compliance: users must be able
         to zoom amounts, addresses, terms). viewport-fit=cover enables safe-area insets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0a0e" />
    <meta name="description" content="Murlan — loja shqiptare e letrave online, në kohë reale." />
    <title>Crypto-Murlan</title>
    <!-- PWA: installable + standalone (add to home screen). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crypto-Murlan" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Browser-tab favicon = the brand logo (black ♠ + red, on a white tile so it stays
         visible on dark tab strips too). PNG so it renders crisply when downscaled to 16–32px. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Oswald:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
