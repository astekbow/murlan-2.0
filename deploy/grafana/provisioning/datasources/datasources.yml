# Auto-provisioned Grafana datasources for the murlan monitoring stack (audit 2026-06-28).
# Gives the existing Prometheus metrics AND the new Loki logs a UI in one place. Opt-in under
# `--profile monitoring`; Grafana is bound to 127.0.0.1 only.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
