# Serves the built SPA and proxies API + Socket.IO to the game server.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # ── Security headers (baseline for a public real-money app) ────────────────
  # Sent on every response (incl. errors) via `always`. HSTS assumes TLS is
  # terminated at/above this layer (enable once HTTPS is in front).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;                 # clickjacking
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # CSP: SPA assets are same-origin; API/WebSocket are same-origin via this proxy.
  # 'unsafe-inline' on style-src covers Tailwind's injected styles; tighten with
  # nonces/hashes if the build is adjusted to support them.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST API.
  location /api/ {
    proxy_pass http://server:3000;
    proxy_set_header Host $host;
    # APPEND this hop to the existing X-Forwarded-For chain (do NOT replace it with
    # $remote_addr): replacing collapses every external client to the proxy IP, which
    # flattens all IP-keyed rate-limiting to one bucket and destroys abuse attribution.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Forward the scheme set by the TLS terminator (Caddy) so the app sees the real
    # https origin — needed for correct Secure-cookie + req.protocol behaviour.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # Socket.IO (WebSocket upgrade).
  location /socket.io/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    # Append (not replace) — see the REST block above.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }
}
