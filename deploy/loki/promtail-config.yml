# Promtail: discovers every container via the Docker socket and ships its stdout/stderr (the json-file
# logs the stack already writes) to Loki. Opt-in under `--profile monitoring`. (audit 2026-06-28)
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker service-discovery: read each container's logs through the Docker API and label them by
  # container name + compose service, so you can `{{service="server"}}` in LogQL.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      # Server/postgres emit structured JSON (pino) — lift the level so you can filter by it in Loki.
      - json:
          expressions:
            level: level
      - labels:
          level:
