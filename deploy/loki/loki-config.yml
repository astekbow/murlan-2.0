# Loki single-binary config for the murlan single-host stack (audit 2026-06-28, centralized logging).
# Opt-in: only runs under `--profile monitoring`. Compose binds it to 127.0.0.1:3100 (never public).
# Filesystem storage on the loki_data volume — the host disk is the only store, so retention is bounded.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h          # 7 days — the host disk is the only store; tune to taste
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  compaction_interval: 10m

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules

# Loki has NO bundled UI. Query it via LogQL through the API (127.0.0.1:3100) / `logcli`, or via the
# grafana service (same `monitoring` profile) which provisions this as a datasource.
