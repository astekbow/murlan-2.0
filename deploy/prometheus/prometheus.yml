# Prometheus config for the Crypto-Murlan stack. Scrapes the server's /metrics over
# the internal Docker network (a private 172.x IP, which the server serves /metrics to
# WITHOUT a token — see app.ts), evaluates deploy/prometheus/alerts.yml, and forwards
# firing alerts to Alertmanager (which pages Telegram).
#
# Brought up by the `monitoring` profile in docker-compose.deploy.yml:
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile monitoring up -d

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: murlan # the alert rules match up{job="murlan"}
    metrics_path: /metrics
    static_configs:
      - targets: ['server:3000'] # internal Docker network → no token needed
