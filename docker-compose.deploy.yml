# Deploy overlay: adds Caddy for automatic HTTPS (Let's Encrypt) in front of the
# client, so the whole stack comes up on a real https:// URL with one command.
#
#   In .env:  CADDY_DOMAIN=yourdomain.com        (or  <SERVER_IP>.sslip.io  for a quick test)
#             CLIENT_ORIGIN=https://yourdomain.com   (must match — secure cookies)
#             ALLOW_STUB_PROVIDERS=true               (demo without payment/email integration)
#   Run:      docker compose -f docker-compose.yml -f docker-compose.deploy.yml up --build -d
#
# Requires ports 80 + 443 open on the host, and CADDY_DOMAIN's DNS pointing at it
# (sslip.io does this automatically: 203.0.113.7.sslip.io → 203.0.113.7).
services:
  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648 # pinned (audit L11)
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?set CADDY_DOMAIN in .env (your domain, or <SERVER_IP>.sslip.io)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: ['client']
    logging: { driver: json-file, options: { max-size: '10m', max-file: '5' } }

  # Keep the stack restarting across reboots/crashes in a real deploy. Postgres +
  # Redis MUST be here too: without a restart policy they don't come back after a
  # VPS reboot / OOM-kill, and the server then crash-loops on `migrate deploy`
  # because it can't reach the DB (audit 2026-06-08, finding C3).
  # Resource caps (audit: a runaway container shouldn't let the OOM-killer evict
  # Postgres mid-write and corrupt the ledger) + Docker log rotation (so container
  # stdout can't fill a small disk). Caps are env-overridable to size to YOUR VPS.
  # DEFAULTS are now tuned for the FINLAND box (~7.8 GB RAM, 4 cores). ⚠️ HISTORY: they
  # used to be tuned for a 1 GB host (SERVER_MEM_LIMIT=384m). After the move to the 7.8 GB
  # box those tiny caps were NOT raised, so the Node server (which does NOT see the cgroup
  # limit and sizes its heap off host RAM) grew past 384 MB and Docker OOM-KILLED it (exit
  # 137) → restart → EVERY live socket dropped at once (players "all disconnected mid-match",
  # 2026-07). Fix: caps sized for the real box + --max-old-space-size so Node GCs INSIDE the
  # cap instead of being SIGKILLed. Total default ≈ 3.9 GB, well under 7.8 GB (headroom for
  # the OS + spikes). Postgres gets the largest share + a reservation so the kernel prefers
  # killing the app/redis over the database under pressure. Override in .env if your box differs.
  postgres:
    restart: unless-stopped
    stop_grace_period: 60s   # let Postgres flush WAL + finish a backup dump cleanly
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-512m}
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    logging: { driver: json-file, options: { max-size: '50m', max-file: '5' } }  # bigger ring so a money incident stays traceable (audit 2026-06-28)
  redis:
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    logging: { driver: json-file, options: { max-size: '10m', max-file: '3' } }
  server:
    restart: unless-stopped
    stop_grace_period: 60s   # let in-flight matches drain (graceful SIGTERM) before kill
    mem_limit: ${SERVER_MEM_LIMIT:-2560m}   # 7.8 GB box: Postgres 2g + Redis 256m + this 2560m + OS ≈ 5.9g (≈1.9g spare). More headroom = fewer GC stalls / OOM-kills under load.
    # SINGLE-INSTANCE ONLY (audit 2026-06-28 #4): timers, rate-limits, room ownership and the deposit/
    # auto-payout CAP serialization are all in-process. Running >1 replica corrupts live matches AND lets
    # a player bypass caps by hitting two instances in parallel. This pins the default to 1; NEVER run
    # `docker compose up --scale server=2`. (Compose V2 honors deploy.replicas; --scale would override it.)
    deploy:
      replicas: 1
    # NOTE: no `cpus` cap — Docker REFUSES to start a container whose `cpus` exceeds the
    # host CPU count (a 1-vCPU box rejected `cpus: 2` and the server wouldn't boot), and
    # CPU capping adds little next to mem_limit (the real ledger-corruption guard). If you
    # move to a multi-core box and want a cap, add `cpus: <n>` here (n <= host CPUs).
    logging: { driver: json-file, options: { max-size: '50m', max-file: '5' } }  # bigger ring for incident forensics (audit 2026-06-28)
    # iOS .mobileconfig signing (→ "Verified", no "Unsigned" warning): the ios-cert-sync sidecar
    # (profile: ios-signing) copies Caddy's Let's Encrypt cert here, chowned to this container's `node`
    # uid. EMPTY unless you enable it — set the two env vars in .env to turn signing on (see below).
    environment:
      # Node does NOT read the container's cgroup mem_limit — without this it sizes its old-space
      # heap off the HOST's 7.8 GB and grows until Docker OOM-kills the container. Pin the MAIN-thread
      # heap comfortably BELOW mem_limit (2560m) so V8 GCs within the cap instead of being SIGKILLed.
      # NOTE: the 3 bot worker_threads carry their OWN heaps on TOP of this — 1536m main + ~3×small
      # worker heaps + Prisma native still fits inside 2560m with room to spare. Env-overridable.
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=1536}
      IOS_PROFILE_SIGN_CERT: ${IOS_PROFILE_SIGN_CERT:-}
      IOS_PROFILE_SIGN_KEY: ${IOS_PROFILE_SIGN_KEY:-}
    volumes:
      - ios_certs:/ios-certs:ro
  client:
    restart: unless-stopped
    mem_limit: ${CLIENT_MEM_LIMIT:-64m}
    logging: { driver: json-file, options: { max-size: '10m', max-file: '3' } }

  # Automatic Postgres backups: a scheduled pg_dump with retention, written to
  # ./backups on the host. Daily by default; keeps 7 daily / 4 weekly / 6 monthly.
  # Restore later with: gunzip -c backups/daily/<file>.sql.gz | docker compose exec -T postgres psql -U murlan -d murlan
  db-backup:
    image: prodrigestivill/postgres-backup-local:16@sha256:a0103fbce0c48ccc7693ddbb2a2bfa733048db845354f635efef9e4566de185d # pinned (audit L11)
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      # Env-driven (infra-5): must match the postgres service creds. Dev default stays
      # murlan/murlan so the running backup keeps working; override in .env for prod.
      POSTGRES_DB: ${POSTGRES_DB:-murlan}
      POSTGRES_USER: ${POSTGRES_USER:-murlan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-murlan}
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: '7'
      BACKUP_KEEP_WEEKS: '4'
      BACKUP_KEEP_MONTHS: '6'
      HEALTHCHECK_PORT: '8080'
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # --- Offsite backup (DEFAULT-ON; no-ops until configured) --------------------
  # db-backup above writes to ./backups on the SAME host disk as the live DB, so a disk/VPS loss
  # takes the real-money DB AND its only backups together (audit 2026-06-08 H5 / 2026-06-28 #3). This syncs
  # ./backups → an rclone remote (S3 / Backblaze B2 / Drive / …) once a day. It is now part of the DEFAULT
  # stack so offsite DR is wired in — but it SAFELY NO-OPS (sleeps) until you configure it on the HOST:
  #   1) install + `rclone config` a remote (default config dir ./deploy/rclone, or set RCLONE_CONFIG_DIR)
  #   2) set BACKUP_REMOTE=<remote:bucket> in .env  ← until this is set, the container just logs "skipping"
  # ⚠️ OWNER ACTION: configure rclone + BACKUP_REMOTE before accepting more deposits — until then there is
  # NO offsite copy of the money ledger. Mirrors deploy/backup-offsite.sh (the manual/host-cron alternative).
  offsite-backup:
    image: rclone/rclone:1@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb # pinned (audit L11)
    restart: unless-stopped
    environment:
      BACKUP_REMOTE: ${BACKUP_REMOTE:-}
      RCLONE_CONFIG: /config/rclone/rclone.conf
    volumes:
      - ./backups:/data:ro
      - ${RCLONE_CONFIG_DIR:-./deploy/rclone}:/config/rclone:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do if [ -z "$$BACKUP_REMOTE" ]; then echo "[offsite] BACKUP_REMOTE unset — skipping (see compose comment)"; sleep 3600; continue; fi; echo "[offsite] sync $$(date -u)"; rclone sync /data "$$BACKUP_REMOTE" --create-empty-src-dirs --transfers 4 || echo "[offsite] sync FAILED"; sleep 86400; done'
    depends_on:
      - db-backup

  # --- iOS profile signing cert-sync (OPT-IN: `--profile ios-signing`) --------
  # Makes the iOS install profile (.mobileconfig) show "Verified" instead of "Unsigned". iOS only
  # trusts a signature from a PUBLICLY-trusted cert, so we sign with Caddy's own Let's Encrypt cert.
  # Caddy stores it 0600/root inside caddy_data; the server runs as the unprivileged `node` user and
  # can't read that. This root sidecar copies the cert+key into the ios_certs volume, chowned to the
  # server's uid (1000) so it CAN read them, and refreshes every 12h to follow renewals.
  # Enable: in .env set IOS_PROFILE_SIGN_CERT=/ios-certs/fullchain.pem + IOS_PROFILE_SIGN_KEY=/ios-certs/
  #         privkey.pem (CADDY_DOMAIN is already set), then add `--profile ios-signing` to the up command.
  ios-cert-sync:
    profiles: ["ios-signing"]
    image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc # pinned (audit L11)
    restart: unless-stopped
    environment:
      # Reuse CADDY_DOMAIN (the domain Caddy already issues the cert for) — the cert hostname can never
      # mismatch and there's nothing extra to set. Defaulted empty (NOT `:?`) so the normal `up` never
      # errors: Compose interpolates every service at load time, even profile-gated ones.
      DOMAIN: ${CADDY_DOMAIN:-}
    volumes:
      - caddy_data:/caddy-data:ro
      - ios_certs:/out
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          if [ -z "$$DOMAIN" ]; then echo "[ios-cert-sync] CADDY_DOMAIN unset — set it in .env"; sleep 3600; continue; fi
          # CADDY_DOMAIN may list several hostnames (e.g. "cryptomurlan.com www.cryptomurlan.com") and
          # Caddy stores ONE cert per hostname dir. Find the cert/key by FILENAME (any ACME-CA subdir),
          # trying each hostname until one resolves — robust to multi-domain + ZeroSSL/Let's Encrypt.
          crt=""; key=""
          for d in $$DOMAIN; do
            crt=$$(find /caddy-data/caddy/certificates -name "$$d.crt" 2>/dev/null | head -1)
            key=$$(find /caddy-data/caddy/certificates -name "$$d.key" 2>/dev/null | head -1)
            [ -n "$$crt" ] && [ -n "$$key" ] && break
          done
          if [ -n "$$crt" ] && [ -n "$$key" ]; then
            cp "$$crt" /out/fullchain.pem && cp "$$key" /out/privkey.pem
            chown 1000:1000 /out/fullchain.pem /out/privkey.pem
            chmod 0640 /out/fullchain.pem /out/privkey.pem
            echo "[ios-cert-sync] synced $$crt at $$(date -u)"
          else
            echo "[ios-cert-sync] no cert yet for [$$DOMAIN] under /caddy-data/caddy/certificates — .crt files present:"
            find /caddy-data/caddy/certificates -name '*.crt' 2>/dev/null | head -20
          fi
          sleep 43200
        done
    depends_on:
      - caddy

  # --- Monitoring (OPT-IN: add `--profile monitoring` to the up command) ------
  # Prometheus scrapes the server's /metrics over the internal network (no token —
  # it's a private 172.x IP) + evaluates deploy/prometheus/alerts.yml. Alertmanager
  # pages your Telegram on a firing alert, reusing TELEGRAM_BOT_TOKEN/CHAT_ID.
  #   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile monitoring up -d
  # Then watch the bracket at http://127.0.0.1:9090 (Prometheus) — bind to localhost.
  prometheus:
    image: prom/prometheus:latest@sha256:a75c5a35bc21d7afe69551eefa3cb1e1fb1775fe759408007a66b54ec3de1f29 # digest-pinned (audit L11); digest wins over :latest
    profiles: ['monitoring']
    restart: unless-stopped
    ports: ['127.0.0.1:9090:9090'] # localhost only — never expose Prometheus publicly
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on: ['server']

  alertmanager:
    image: prom/alertmanager:latest@sha256:af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a # digest-pinned (audit L11); digest wins over :latest
    profiles: ['monitoring']
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env for Telegram alerts}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?set TELEGRAM_CHAT_ID in .env for Telegram alerts}
    entrypoint: ['/bin/sh', '-c']
    # Render the committed template with your bot token + chat id at startup (no secret
    # is ever written to the repo), then run Alertmanager on it.
    command:
      - |
        sed -e "s|__BOT_TOKEN__|$$TELEGRAM_BOT_TOKEN|g" -e "s|__CHAT_ID__|$$TELEGRAM_CHAT_ID|g" \
          /etc/alertmanager/alertmanager.tmpl.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ./deploy/prometheus/alertmanager.tmpl.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
      - alertmanager_data:/alertmanager

  # Centralized logs (audit 2026-06-28): promtail tails every container's stdout via the Docker socket
  # and ships it to Loki; grafana gives both the metrics (Prometheus) AND the logs (Loki) a UI. All three
  # are gated behind the SAME `monitoring` profile as prometheus/alertmanager (one `--profile monitoring`
  # brings the whole observability stack up) and bound to 127.0.0.1 only — never public.
  loki:
    image: grafana/loki:2.9.8 # TODO digest-pin before enabling (audit L11): docker buildx imagetools inspect grafana/loki:2.9.8
    profiles: ['monitoring']
    restart: unless-stopped
    ports: ['127.0.0.1:3100:3100'] # localhost only — the log store is never exposed publicly
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8 # TODO digest-pin before enabling (audit L11)
    profiles: ['monitoring']
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # docker SD: discover containers + read their logs
    depends_on: ['loki']

  grafana:
    image: grafana/grafana:10.4.2 # TODO digest-pin before enabling (audit L11); LTS line
    profiles: ['monitoring']
    restart: unless-stopped
    ports: ['127.0.0.1:3000:3000'] # localhost only — tunnel to it (ssh -L) to view dashboards
    environment:
      # devops-6: no admin/admin default. NOTE: must NOT use ${VAR:?} here — Compose evaluates
      # interpolation for the WHOLE file at parse time, so a required-var error would block the MAIN
      # deploy even though grafana only runs under the (optional) monitoring profile. Use a non-'admin'
      # placeholder default instead; Grafana is localhost-only (SSH-tunnel) and prompts a change on first
      # login. Set GRAFANA_ADMIN_PASSWORD in .env before enabling the monitoring profile (see .env.example).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-murlan_change_this_password}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro # auto-wires the Loki + Prometheus datasources
      - grafana_data:/var/lib/grafana
    depends_on: ['loki', 'prometheus']

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
  ios_certs: # synced Let's Encrypt cert for iOS .mobileconfig signing (profile: ios-signing)
