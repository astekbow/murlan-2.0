# Deploy overlay: adds Caddy for automatic HTTPS (Let's Encrypt) in front of the
# client, so the whole stack comes up on a real https:// URL with one command.
#
#   In .env:  CADDY_DOMAIN=yourdomain.com        (or  <SERVER_IP>.sslip.io  for a quick test)
#             CLIENT_ORIGIN=https://yourdomain.com   (must match — secure cookies)
#             ALLOW_STUB_PROVIDERS=true               (demo without payment/email integration)
#   Run:      docker compose -f docker-compose.yml -f docker-compose.deploy.yml up --build -d
#
# Requires ports 80 + 443 open on the host, and CADDY_DOMAIN's DNS pointing at it
# (sslip.io does this automatically: 203.0.113.7.sslip.io → 203.0.113.7).
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?set CADDY_DOMAIN in .env (your domain, or <SERVER_IP>.sslip.io)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: ['client']

  # Keep the stack restarting across reboots/crashes in a real deploy. Postgres +
  # Redis MUST be here too: without a restart policy they don't come back after a
  # VPS reboot / OOM-kill, and the server then crash-loops on `migrate deploy`
  # because it can't reach the DB (audit 2026-06-08, finding C3).
  postgres:
    restart: unless-stopped
    stop_grace_period: 60s   # let Postgres flush WAL + finish a backup dump cleanly
  redis:
    restart: unless-stopped
  server:
    restart: unless-stopped
    stop_grace_period: 60s   # let in-flight matches drain (graceful SIGTERM) before kill
  client:
    restart: unless-stopped

  # Automatic Postgres backups: a scheduled pg_dump with retention, written to
  # ./backups on the host. Daily by default; keeps 7 daily / 4 weekly / 6 monthly.
  # Restore later with: gunzip -c backups/daily/<file>.sql.gz | docker compose exec -T postgres psql -U murlan -d murlan
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: murlan
      POSTGRES_USER: murlan
      POSTGRES_PASSWORD: murlan
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: '7'
      BACKUP_KEEP_WEEKS: '4'
      BACKUP_KEEP_MONTHS: '6'
      HEALTHCHECK_PORT: '8080'
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # --- Monitoring (OPT-IN: add `--profile monitoring` to the up command) ------
  # Prometheus scrapes the server's /metrics over the internal network (no token —
  # it's a private 172.x IP) + evaluates deploy/prometheus/alerts.yml. Alertmanager
  # pages your Telegram on a firing alert, reusing TELEGRAM_BOT_TOKEN/CHAT_ID.
  #   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile monitoring up -d
  # Then watch the bracket at http://127.0.0.1:9090 (Prometheus) — bind to localhost.
  prometheus:
    image: prom/prometheus:latest
    profiles: ['monitoring']
    restart: unless-stopped
    ports: ['127.0.0.1:9090:9090'] # localhost only — never expose Prometheus publicly
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on: ['server']

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ['monitoring']
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env for Telegram alerts}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?set TELEGRAM_CHAT_ID in .env for Telegram alerts}
    entrypoint: ['/bin/sh', '-c']
    # Render the committed template with your bot token + chat id at startup (no secret
    # is ever written to the repo), then run Alertmanager on it.
    command:
      - |
        sed -e "s|__BOT_TOKEN__|$$TELEGRAM_BOT_TOKEN|g" -e "s|__CHAT_ID__|$$TELEGRAM_CHAT_ID|g" \
          /etc/alertmanager/alertmanager.tmpl.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ./deploy/prometheus/alertmanager.tmpl.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
      - alertmanager_data:/alertmanager

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
