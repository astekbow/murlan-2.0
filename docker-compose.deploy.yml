# Deploy overlay: adds Caddy for automatic HTTPS (Let's Encrypt) in front of the
# client, so the whole stack comes up on a real https:// URL with one command.
#
#   In .env:  CADDY_DOMAIN=yourdomain.com        (or  <SERVER_IP>.sslip.io  for a quick test)
#             CLIENT_ORIGIN=https://yourdomain.com   (must match — secure cookies)
#             ALLOW_STUB_PROVIDERS=true               (demo without payment/email integration)
#   Run:      docker compose -f docker-compose.yml -f docker-compose.deploy.yml up --build -d
#
# Requires ports 80 + 443 open on the host, and CADDY_DOMAIN's DNS pointing at it
# (sslip.io does this automatically: 203.0.113.7.sslip.io → 203.0.113.7).
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?set CADDY_DOMAIN in .env (your domain, or <SERVER_IP>.sslip.io)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: ['client']

  # Keep the stack restarting across reboots/crashes in a real deploy. Postgres +
  # Redis MUST be here too: without a restart policy they don't come back after a
  # VPS reboot / OOM-kill, and the server then crash-loops on `migrate deploy`
  # because it can't reach the DB (audit 2026-06-08, finding C3).
  postgres:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  server:
    restart: unless-stopped
  client:
    restart: unless-stopped

  # Automatic Postgres backups: a scheduled pg_dump with retention, written to
  # ./backups on the host. Daily by default; keeps 7 daily / 4 weekly / 6 monthly.
  # Restore later with: gunzip -c backups/daily/<file>.sql.gz | docker compose exec -T postgres psql -U murlan -d murlan
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: murlan
      POSTGRES_USER: murlan
      POSTGRES_PASSWORD: murlan
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: '7'
      BACKUP_KEEP_WEEKS: '4'
      BACKUP_KEEP_MONTHS: '6'
      HEALTHCHECK_PORT: '8080'
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
